  <link rel="stylesheet" href="style.css">
  <style>

    .page-header h1 { font-family: "BrasiliaDelight"; font-size: 50px; color: var(--maroon); margin-bottom: 10px; padding: 0 10px;   -webkit-text-stroke: 1px var(--maroon);
}
    .back-btn { display: inline-block; margin-top: 20px; font-family: "ArtigoDisplay"; color: var(--primary); text-decoration: none; border-bottom: 1px dotted var(--primary); }
    .back-btn:hover { color: var(--maroon); border-bottom-color: var(--maroon); }
    .coming-soon { text-align: center; margin-top: 100px; font-size: 24px; color: var(--muted); }
  
    .container {
      max-width: 95% !important;
      margin-top: 10px !important;
      padding: 10px !important;
    }
    .photo-gallery {
      padding: 10px !important;
    }
  </style>
</head>

      <header class="page-header">

        <a href="index.html#gallery" class="back-btn">← Back to Memories</a>

        const gallery = document.getElementById('photo-gallery');
        const loading = document.getElementById('loading');
        let currentIndex = 0;
        const batchSize = 30;
        let isFetching = false;
        
        function loadMorePhotos() {
            if (isFetching || currentIndex >= photoIds.length) return;
            isFetching = true;
            loading.style.display = 'block';
            
            const end = Math.min(currentIndex + batchSize, photoIds.length);
            for (let i = currentIndex; i < end; i++) {
                const id = photoIds[i];
                const imgUrl = 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1500';
                
                const imgContainer = document.createElement('div');
                imgContainer.className = 'gallery-img-container';
                imgContainer.onclick = () => openLightbox(i);
                
                const img = document.createElement('img');
                img.src = imgUrl;
                img.loading = 'lazy';
                img.className = 'gallery-img';
                
                imgContainer.appendChild(img);
                gallery.appendChild(imgContainer);
            }
            currentIndex = end;
            loading.style.display = 'none';
            isFetching = false;
        }
        
        // Initial load
        loadMorePhotos();
        
        // Infinite scroll
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                loadMorePhotos();
            }
        });
        
        // Lightbox logic
        let currentLightboxIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        
        function openLightbox(index) {
            currentLightboxIndex = index;
            lightbox.style.display = 'flex';
            lightboxImg.src = 'https://drive.google.com/thumbnail?id=' + photoIds[index] + '&sz=w4000';
        }
        
        function closeLightbox() {
            lightbox.style.display = 'none';
            lightboxImg.src = '';
        }
        
        function changeImage(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex < 0) currentLightboxIndex = photoIds.length - 1;
            if (currentLightboxIndex >= photoIds.length) currentLightboxIndex = 0;
            lightboxImg.src = 'https://drive.google.com/thumbnail?id=' + photoIds[currentLightboxIndex] + '&sz=w4000';
        }
